<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Escritorio</title>
    <!-- Importar fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            /* Fondo de pantalla del escritorio */
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            user-select: none;
        }

        /* Área del escritorio */
        .desktop {
            width: 100vw;
            height: calc(100vh - 60px);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            align-content: flex-start;
            flex-wrap: wrap;
            gap: 25px;
        }

        /* Estilo de los Íconos del Escritorio */
        .icon {
            width: 80px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            padding: 10px;
            transition: all 0.2s ease;
        }
        .icon:hover {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .icon svg {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
            color: #74b9ff;
        }
        .icon span {
            color: white;
            text-shadow: 0px 1px 4px rgba(0,0,0,0.8);
            font-size: 0.85rem;
            display: block;
            margin-top: 8px;
            font-weight: 500;
        }

        /* Estilo de las Ventanas (Carpetas) */
        .window {
            position: absolute;
            top: 10%;
            left: 20%;
            width: 650px;
            height: 450px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            display: none; /* Ocultas por defecto */
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.6);
            z-index: 10;
        }
        .window.active {
            display: flex;
        }

        /* Barra superior de la ventana */
        .title-bar {
            background: rgba(240, 240, 240, 0.9);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
            cursor: grab;
        }
        .title-bar:active { cursor: grabbing; }
        .controls {
            display: flex;
            gap: 8px;
            width: 60px; /* Espacio fijo para empujar el titulo al centro */
        }
        .control-btn {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        .close { background: #ff5f56; border: 1px solid #e0443e; }
        .close:hover { background: #e0443e; }
        .minimize { background: #ffbd2e; border: 1px solid #dea123; }
        .maximize { background: #27c93f; border: 1px solid #1aab29; }
        
        .title {
            font-weight: 600;
            color: #444;
            font-size: 0.95rem;
            flex-grow: 1;
            text-align: center;
            margin-right: 60px; /* Balancea los botones */
            pointer-events: none;
        }

        /* Contenido dentro de la ventana */
        .content {
            padding: 20px;
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.5);
            overflow-y: auto;
            display: flex;
            gap: 25px;
            align-content: flex-start;
            flex-wrap: wrap;
        }

        .file-icon {
            text-align: center;
            width: 80px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .file-icon:hover { background: rgba(0, 120, 215, 0.1); }
        .file-icon svg { width: 45px; height: 45px; }
        .file-icon.pdf svg { color: #e74c3c; }
        .file-icon.image svg { color: #2ecc71; }
        .file-icon.drive svg { color: #95a5a6; }
        .file-icon span {
            display: block;
            font-size: 0.8rem;
            color: #333;
            margin-top: 5px;
            word-wrap: break-word;
        }

        /* Barra de Tareas inferior */
        .taskbar {
            height: 60px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(15px);
            width: 100vw;
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .taskbar-icon {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .taskbar-icon:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- ESCRITORIO -->
    <div class="desktop" id="desktop">
        <!-- Ícono 1: Descargas -->
        <div class="icon" ondblclick="openWindow('window-descargas')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
            <span>Descargas</span>
        </div>
        
        <!-- Ícono 2: Dispositivos -->
        <div class="icon" ondblclick="openWindow('window-dispositivos')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M20 7h-5V4c0-1.1-.9-2-2-2h-2C9.9 2 9 2.9 9 4v3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zM11 4h2v3h-2V4zm9 16H4V9h16v11z"/></svg>
            <span>Dispositivos</span>
        </div>
    </div>

    <!-- VENTANA 1: Descargas -->
    <div class="window" id="window-descargas">
        <div class="title-bar">
            <div class="controls">
                <button class="control-btn close" onclick="closeWindow('window-descargas')"></button>
                <button class="control-btn minimize"></button>
                <button class="control-btn maximize"></button>
            </div>
            <div class="title">Descargas</div>
        </div>
        <div class="content">
            <!-- Archivos Falsos -->
            <div class="file-icon pdf" onclick="alert('Abriendo Reporte Confidencial...')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Reporte.pdf</span>
            </div>
            <div class="file-icon image" onclick="alert('Mostrando imagen corporativa')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>Logo.png</span>
            </div>
        </div>
    </div>

    <!-- VENTANA 2: Dispositivos -->
    <div class="window" id="window-dispositivos">
        <div class="title-bar">
            <div class="controls">
                <button class="control-btn close" onclick="closeWindow('window-dispositivos')"></button>
                <button class="control-btn minimize"></button>
                <button class="control-btn maximize"></button>
            </div>
            <div class="title">Dispositivos y Unidades</div>
        </div>
        <div class="content">
            <div class="file-icon drive">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M2 14h20v5H2v-5zm0-7h20v5H2V7zm2-2h16v-2H4v2z"/></svg>
                <span>Disco Local (C:)</span>
            </div>
            <div class="file-icon drive" style="color: #e67e22;" onclick="alert('Dispositivo USB infectado bloqueado.')">
                <svg fill="currentColor" viewBox="0 0 24 24"><path d="M15 7v4h1v2h-3V5h2l-3-4-3 4h2v8H8v-2h1V7H5v4h1v2H3v8h18v-8h-3v-2h1z"/></svg>
                <span>USB_Seguridad (E:)</span>
            </div>
        </div>
    </div>

    <!-- BARRA DE TAREAS -->
    <div class="taskbar">
        <div class="taskbar-icon">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        </div>
        <div class="taskbar-icon">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </div>
    </div>

    <!-- LOGICA JAVASCRIPT -->
    <script>
        let highestZ = 10;

        function openWindow(id) {
            const win = document.getElementById(id);
            win.classList.add('active');
            bringToFront(win);
        }

        function closeWindow(id) {
            document.getElementById(id).classList.remove('active');
        }

        function bringToFront(win) {
            highestZ++;
            win.style.zIndex = highestZ;
        }

        // Lógica para poder arrastrar las ventanas
        document.querySelectorAll('.window').forEach(win => {
            // Al hacer clic en cualquier parte de la ventana, traer al frente
            win.addEventListener('mousedown', () => bringToFront(win));
            
            const titleBar = win.querySelector('.title-bar');
            let isDragging = false, startX, startY, initialX, initialY;
            
            titleBar.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
                initialX = win.offsetLeft;
                initialY = win.offsetTop;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                win.style.left = (initialX + dx) + 'px';
                win.style.top = (initialY + dy) + 'px';
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
            });
        });
    </script>
</body>
</html>
