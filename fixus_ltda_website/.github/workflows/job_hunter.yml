name: Hermes Job Hunter Daily Run

on:
  schedule:
    # Se ejecuta todos los dias a las 11:00 UTC (07:00 AM hora Chile)
    - cron: '0 11 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente con un boton

jobs:
  run-job-hunter:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el codigo del repositorio
      uses: actions/checkout@v3

    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar librerias necesarias
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv ddgs

    - name: Ejecutar el Agente Hermes Job Hunter
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        FIXUS_ZOHO_APP_PASSWORD: ${{ secrets.FIXUS_ZOHO_APP_PASSWORD }}
        SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      run: python job_hunter_agent.py

    - name: Guardar la base de datos de trabajos para no repetir
      run: |
        git config --global user.name 'Hermes Bot'
        git config --global user.email 'hermes@fixusconsulting.com'
        git add jobs_db.json
        git commit -m "Automated update: Actualizar historial de ofertas vistas" || echo "No hay cambios para guardar"
        git push
